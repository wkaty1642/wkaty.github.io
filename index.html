<html lang="ru">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background-color: #f4f7f2;
            color: #2c3e2f;
        }

        .header {
            background-color: #ffffff;

            display: flex;

        }

        .logo h1 {

        }
        .logo p {

        }

        .nav a {

            text-decoration: none;
            color: #2c3e2f;

        .nav a:hover {
            color: #3cac51;
        }

            padding: 2rem 1rem;

        .hero h2 {
            font-size: 2rem;
            color: #1f5e2d;
        }
        .hero p {
            font-size: 1rem;

        }

        .content-container {

            margin: 2rem auto;
            padding: 0 1rem;

            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #dce8da;
        }
        
        .market-photo {
            width: 100%;
            height: 400px;
            object-fit: cover;
            object-position: center;
        }
        
        .info-section {
            padding: 30px;
        }
        
        .info-section h3 {
            color: #1f5e2d;
            font-size: 1.6rem;
            margin-bottom: 20px;
            border-left: 5px solid #3cac51;
            padding-left: 15px;
        }
        
        .info-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 20px;
        }
        
        .info-card {
            flex: 1;
            min-width: 250px;
            background: #f9fbf8;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e0eadc;
        }
        
        .info-card h4 {
            color: #1f5e2d;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        .info-card p {
            margin: 10px 0;
            line-height: 1.5;
        }
        
        .work-hours-table {
            width: 100%;
        }
        
        .work-hours-table tr td {
            padding: 8px 0;
        }
        
        .work-hours-table tr td:last-child {
            text-align: right;
            font-weight: bold;
        }
        
        .tenants-page {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #dce8da;
            padding: 30px;
        }
        
        .tenants-header {
            background: linear-gradient(135deg, #2a6e3a 0%, #1f5e2d 100%);
            margin: -30px -30px 30px -30px;
            padding: 30px;
            color: white;
        }
        
        .tenants-header h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .contact-card {
            background: #f9fbf8;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 5px solid #3cac51;
        }
        
        .contact-card h4 {
            color: #1f5e2d;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        .contact-phone {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1f5e2d;
            margin: 15px 0;
        }
        
        .contact-phone a {
            color: #1f5e2d;
            text-decoration: none;
        }
        
        .contact-phone a:hover {
            color: #3cac51;
        }
        
        .requirements-list {
            list-style: none;
            padding: 0;
        }
        
        .requirements-list li {
            padding: 10px 0;
            border-bottom: 1px solid #e0eadc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .requirements-list li:before {
            content: "✓";
            color: #3cac51;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .map-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid #dce8da;
            position: relative;
        }
        
        .market-map-image {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
        }
        
        .map-zones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Стили для многоугольных зон */
        .polygon-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(60, 172, 81, 0.25);
            border: 2px solid #3cac51;
            cursor: pointer;
            transition: all 0.2s ease;
            pointer-events: auto;
        }
        
        .polygon-zone:hover {
            background-color: rgba(60, 172, 81, 0.55);
            border-color: #1f5e2d;
        }
        
        .zone-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #1f5e2d;
            color: white;
            padding: 6px 12px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .polygon-zone:hover .zone-label {
            opacity: 1;
        }
        
        .info-panel {
            padding: 20px 25px;
            background-color: #fefefe;
            border-top: 1px solid #e0eadc;
        }
        
        .info-panel h3 {
            color: #1a4d24;
            margin-bottom: 8px;
            border-left: 5px solid #3cac51;
            padding-left: 12px;
        }
        
        .info-panel p {
            color: #3d4e40;
            margin-top: 8px;
        }
        
        .footer {
            background-color: #1d2a1a;
            color: #cde2c7;
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .nav a {
                margin: 0 10px;
            }
            .hero h2 {
                font-size: 1.4rem;
            }
            .market-photo {
                height: 200px;
            }
            .contact-phone {
                font-size: 1.3rem;
            }
            .zone-label {
                font-size: 10px;
                padding: 3px 8px;
                white-space: nowrap;
            }
        }
    </style>
</head>

            const img = document.getElementById('marketMapImage');
            const zonesContainer = document.getElementById('mapZones');

            const imgWidth = 2880;
            const imgHeight = 1800;
            
            // Функция обновления clip-path при изменении размера окна
            function updatePolygonClipPaths() {
                const rect = img.getBoundingClientRect();
                const currentWidth = rect.width;
                const currentHeight = rect.height;
                if (currentWidth === 0) return;
                
                const scaleX = currentWidth / imgWidth;
                const scaleY = currentHeight / imgHeight;
                
                document.querySelectorAll('.polygon-zone').forEach(zone => {
                    const pointsData = zone.dataset.points;

                        const points = JSON.parse(pointsData);

                            x: p.x * scaleX,
                            y: p.y * scaleY
                        }));

                const zone = document.createElement('div');
                zone.className = 'polygon-zone';
                zone.dataset.points = JSON.stringify(polyData.points);
                zone.dataset.name = polyData.name;
                
                // Создаём подпись (изначально скрыта)
                const label = document.createElement('div');
                label.className = 'zone-label';
                label.textContent = polyData.name;
                label.style.opacity = '0';
                zone.appendChild(label);
                
                // Показываем подпись при наведении
                zone.addEventListener('mouseenter', () => {
                    label.style.opacity = '1';
                });
                
                // Скрываем подпись при уходе мыши
                zone.addEventListener('mouseleave', () => {
                    label.style.opacity = '0';
                });
                
                // Обработчик клика
                zone.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.getElementById('placeName').innerHTML = `<strong>${polyData.name}</strong><br>${polyData.desc}`;
                });
                
                zonesContainer.appendChild(zone);
            });
            
            zonesContainer.style.position = 'absolute';
            zonesContainer.style.top = '0';
            zonesContainer.style.left = '0';
            zonesContainer.style.width = '100%';
            zonesContainer.style.height = '100%';
            
            if (img.complete && img.naturalWidth !== 0) {
                updatePolygonClipPaths();
            } else {
                img.onload = updatePolygonClipPaths;
            }
            
            window.addEventListener('resize', function() {
                setTimeout(updatePolygonClipPaths, 100);
            });
        }
        
        // ==========================================================
        // НАВИГАЦИЯ
        // ==========================================================
        
        let currentPage = 'home';
        
        function navigateTo(page) {
            currentPage = page;
            if (page === 'home') {
                renderHomePage();
            } else if (page === 'tenants') {
                renderTenantsPage();
            } else if (page === 'map') {
                renderMapPage();
            }
        }
        
        document.getElementById('homeNavBtn').addEventListener('click', () => navigateTo('home'));
        document.getElementById('mapNavBtn').addEventListener('click', () => navigateTo('map'));
        document.getElementById('tenantsNavBtn').addEventListener('click', () => navigateTo('tenants'));
        
        navigateTo('home');
    </script>
</body>
</html>
